<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Tasin's Bookshelf</title>
    <script src="js/data.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Raleway', 'Inter', sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #f8fffe 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 0.6s ease;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #228B22 0%, #1a6b1a 100%);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-size: 24px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(34, 139, 34, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-weight: bold;
        }

        .back-btn:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 12px 30px rgba(34, 139, 34, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .breadcrumb {
            flex: 1;
        }

        .breadcrumb-link {
            color: #228B22;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .breadcrumb-link:hover {
            color: #DC143C;
        }

        .breadcrumb-link.active {
            color: #228B22;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            color: #228B22;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 1px;
        }

        .subtitle {
            color: #666;
            font-size: 17px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        .bookshelf {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            animation: fadeInUp 0.9s ease 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .book-spine {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 240px;
            padding: 18px;
            background: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.3), 4px 10px 20px rgba(0, 0, 0, 0.25);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.15);
            font-size: 1rem;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .book-spine:nth-child(2n) {
            background: linear-gradient(135deg, #1976D2 0%, #1565C0 100%);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.3), 4px 10px 20px rgba(25, 118, 210, 0.2);
        }

        .book-spine:nth-child(3n) {
            background: linear-gradient(135deg, #388E3C 0%, #2E7D32 100%);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.3), 4px 10px 20px rgba(56, 142, 60, 0.2);
        }

        .book-spine:nth-child(4n) {
            background: linear-gradient(135deg, #F57C00 0%, #E65100 100%);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.3), 4px 10px 20px rgba(245, 124, 0, 0.2);
        }

        .book-spine:nth-child(5n) {
            background: linear-gradient(135deg, #7B1FA2 0%, #6A1B9A 100%);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.3), 4px 10px 20px rgba(123, 31, 162, 0.2);
        }

        .book-spine:nth-child(6n) {
            background: linear-gradient(135deg, #C2185B 0%, #AD1457 100%);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.3), 4px 10px 20px rgba(194, 24, 91, 0.2);
        }

        .book-spine:hover {
            transform: translateY(-20px) rotateZ(-3deg) scale(1.1);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.2), 0px 28px 55px rgba(0, 0, 0, 0.35);
            border-color: rgba(255, 255, 255, 0.3);
            filter: brightness(1.2);
        }

        .book-spine::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.6));
            border-radius: 0 10px 0 0;
        }

        .book-spine-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .book-title {
            font-size: 16px;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        .book-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .no-books {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-books h2 {
            margin-bottom: 10px;
        }

        .no-books a {
            color: #228B22;
            text-decoration: none;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .bookshelf {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .book-spine {
                min-height: 200px;
                padding: 15px;
            }

            .book-title {
                font-size: 14px;
            }

            .book-icon {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }

            h1 {
                font-size: 24px;
            }

            .bookshelf {
                grid-template-columns: repeat(2, 1fr);
            }

            .book-spine {
                min-height: 160px;
                padding: 12px;
            }

            .book-title {
                font-size: 13px;
                font-weight: 700;
            }

            .book-icon {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()" title="Go back">←</button>
            <div class="breadcrumb">
                <a href="index.html" class="breadcrumb-link">Library</a>
                <span style="color: #228B22; margin: 0 10px; font-weight: 600;">→</span>
                <a href="writers.html" class="breadcrumb-link">Writers</a>
                <span style="color: #228B22; margin: 0 10px; font-weight: 600;">→</span>
                <a href="#" class="breadcrumb-link" id="writer-link">Writer</a>
                <span style="color: #228B22; margin: 0 10px; font-weight: 600;">→</span>
                <span id="category-name" class="breadcrumb-link active">Category</span>
            </div>
        </div>

        <h1 id="page-title">Books</h1>
        <p class="subtitle" id="subtitle">Tap a book to view details</p>

        <div class="bookshelf" id="books-container">
            <!-- Books will be loaded here -->
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const writerName = params.get('writer');
        const categoryName = params.get('category');

        function goBack() {
            window.location.href = `categories.html?writer=${encodeURIComponent(writerName)}`;
        }

        function loadBooks() {
            if (!writerName || !categoryName) {
                document.querySelector('.container').innerHTML = '<div class="no-books"><h2>Invalid category</h2><a href="writers.html">← Back to Writers</a></div>';
                return;
            }

            const books = getBooksInCategory(writerName, categoryName);
            
            if (!books || books.length === 0) {
                document.querySelector('.container').innerHTML = '<div class="no-books"><h2>No books found</h2><a href="writers.html">← Back to Writers</a></div>';
                return;
            }

            document.title = `${categoryName} - ${writerName} - Tasin's Bookshelf`;
            document.getElementById('page-title').textContent = categoryName;
            document.getElementById('subtitle').textContent = `${books.length} book${books.length !== 1 ? 's' : ''} in this category`;
            document.getElementById('category-name').textContent = categoryName;
            
            const writerLink = document.getElementById('writer-link');
            writerLink.href = `categories.html?writer=${encodeURIComponent(writerName)}`;
            writerLink.textContent = writerName;

            const container = document.getElementById('books-container');
            container.innerHTML = '';

            books.forEach((book, index) => {
                const spine = document.createElement('a');
                spine.href = `book.html?writer=${encodeURIComponent(writerName)}&book=${encodeURIComponent(book.title)}&category=${encodeURIComponent(categoryName)}`;
                spine.className = 'book-spine';
                spine.title = book.title;
                spine.innerHTML = `
                    <div class="book-spine-content">
                        <span class="book-icon">📖</span>
                        <div class="book-title">${book.title}</div>
                    </div>
                `;
                container.appendChild(spine);
            });
        }

        window.addEventListener('load', loadBooks);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadBooks);
        } else {
            loadBooks();
        }
    </script>
</body>
</html>
