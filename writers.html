
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Writers & Books - Tasin's Library</title>
    <script src="js/data.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fffe;
            --text-primary: #000;
            --text-secondary: #666;
            --header-bg: rgba(34, 139, 34, 0.1);
            --card-bg: #ffffff;
            --card-border: rgba(34, 139, 34, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg-primary: #1a1a1a;
            --bg-secondary: #0f1f15;
            --text-primary: #f5f5f5;
            --text-secondary: #b0b0b0;
            --header-bg: #e8e8e8;
            --card-bg: #2a2a2a;
            --card-border: rgba(34, 139, 34, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Raleway', 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Header */
        header {
            background: var(--header-bg);
            color: #228B22;
            padding: 25px;
            backdrop-filter: blur(10px);
            border-bottom: 4px solid #228B22;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: background 0.3s ease;
            position: relative;
        }

        body.dark-mode header {
            background: #e8e8e8 !important;
            color: #222;
        }

        .theme-toggle-writers {
            padding: 10px 18px;
            border: 2px solid #228B22;
            background: var(--card-bg);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow-color);
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .theme-toggle-writers:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 18px rgba(34, 139, 34, 0.3);
        }

        header h1 {
            font-size: 2.2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            color: #228B22;
            letter-spacing: 1px;
        }

        body.dark-mode header h1 {
            color: #0d4d0d;
        }

        .back-btn {
            background: linear-gradient(135deg, #228B22 0%, #1a6b1a 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            font-size: 0.98rem;
            box-shadow: 0 6px 15px rgba(34, 139, 34, 0.25);
            letter-spacing: 0.5px;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #2aad2a 0%, #228B22 100%);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(34, 139, 34, 0.35);
        }

        .back-btn:active {
            transform: translateY(-1px);
        }

        /* Container */
        /* Search Bar */
        .search-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 25px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #228B22;
            border-radius: 25px;
            outline: none;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(34, 139, 34, 0.1);
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .search-input:focus {
            border-color: #DC143C;
            box-shadow: 0 8px 25px rgba(34, 139, 34, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-clear {
            padding: 12px 24px;
            background: linear-gradient(135deg, #DC143C 0%, #9b0d2c 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(220, 20, 60, 0.2);
        }

        .search-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(220, 20, 60, 0.3);
        }

        .search-results {
            display: none;
            background: var(--header-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #228B22;
            color: var(--text-primary);
        }

        .search-results.active {
            display: block;
        }

        .search-result-count {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .search-result-item {
            background: var(--card-bg);
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 3px solid #228B22;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .search-result-item:hover {
            background: rgba(34, 139, 34, 0.15);
            transform: translateX(5px);\ncolor: var(--text-primary);
        }
        }

        .search-result-writer {
            font-weight: 700;
            color: #228B22;
        }

        .search-result-book {
            color: #666;
            font-size: 14px;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 16px;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 45px 25px;
        }

        /* Writer Section */
        .writer-section {
            margin-bottom: 55px;
            animation: fadeIn 0.7s ease;
        }

        .writer-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            background: linear-gradient(135deg, rgba(34, 139, 34, 0.1) 0%, rgba(220, 20, 60, 0.05) 100%);
            padding: 22px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 2px solid #228B22;
            border-left: 6px solid #228B22;
            box-shadow: 0 4px 12px rgba(34, 139, 34, 0.1);
            transition: all 0.3s ease;
        }

        .writer-header:hover {
            background: linear-gradient(135deg, rgba(34, 139, 34, 0.15) 0%, rgba(220, 20, 60, 0.1) 100%);
            box-shadow: 0 8px 20px rgba(34, 139, 34, 0.15);
            transform: translateX(5px);
        }

        .writer-header-icon {
            font-size: 2.8rem;
            animation: float 3s ease-in-out infinite;
        }

        .writer-header h2 {
            color: #228B22;
            font-size: 1.9rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.5px;
        }

        /* Bookshelf */
        .bookshelf {
            background: linear-gradient(135deg, rgba(240, 255, 240, 0.6) 0%, rgba(255, 255, 255, 0.9) 100%);
            border: 2px solid rgba(34, 139, 34, 0.2);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(34, 139, 34, 0.1), inset 0 1px 3px rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: visible;
            cursor: default;
            transition: all 0.4s ease;
        }

        .bookshelf:hover {
            box-shadow: 0 15px 35px rgba(34, 139, 34, 0.15), inset 0 1px 3px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .bookshelf::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(34, 139, 34, 0.15), transparent);
            pointer-events: none;
        }

        .books-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
            gap: 15px;
            align-items: flex-end;
            min-height: 310px;
            position: relative;
            z-index: 2;
            padding: 15px;
        }
        
        /* Larger shelves when there are many books */
        .books-display--many {
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 18px;
            min-height: 340px;
        }

        /* Individual Book */
        .book {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideUp 0.5s ease backwards;
        }

        .book:nth-child(1) { animation-delay: 0.05s; }
        .book:nth-child(2) { animation-delay: 0.1s; }
        .book:nth-child(3) { animation-delay: 0.15s; }
        .book:nth-child(4) { animation-delay: 0.2s; }
        .book:nth-child(5) { animation-delay: 0.25s; }
        .book:nth-child(6) { animation-delay: 0.3s; }

        .book-spine {
            width: 100%;
            height: 200px;
            border-radius: 5px 5px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-weight: 800;
            font-size: 0.95rem;
            padding: 12px;
            word-wrap: break-word;
            word-break: break-word;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.3), 3px 8px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            line-height: 1.2;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .book-spine::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: rgba(255, 255, 255, 0.4);
        }

        .book-spine::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.6));
            border-radius: 0 5px 0 0;
        }

        /* Book Colors - Extended Palette */
        .book:nth-child(1) .book-spine { background: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%); }
        .book:nth-child(2) .book-spine { background: linear-gradient(135deg, #1976D2 0%, #1565C0 100%); }
        .book:nth-child(3) .book-spine { background: linear-gradient(135deg, #388E3C 0%, #2E7D32 100%); }
        .book:nth-child(4) .book-spine { background: linear-gradient(135deg, #F57C00 0%, #E65100 100%); }
        .book:nth-child(5) .book-spine { background: linear-gradient(135deg, #7B1FA2 0%, #6A1B9A 100%); }
        .book:nth-child(6) .book-spine { background: linear-gradient(135deg, #C2185B 0%, #AD1457 100%); }
        .book:nth-child(7) .book-spine { background: linear-gradient(135deg, #00695C 0%, #004D40 100%); }
        .book:nth-child(8) .book-spine { background: linear-gradient(135deg, #6A1B9A 0%, #4A148C 100%); }
        .book:nth-child(9) .book-spine { background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%); }
        .book:nth-child(10) .book-spine { background: linear-gradient(135deg, #0097A7 0%, #006064 100%); }
        .book:nth-child(11) .book-spine { background: linear-gradient(135deg, #D32F2F 0%, #F57C00 100%); }
        .book:nth-child(12) .book-spine { background: linear-gradient(135deg, #1976D2 0%, #7B1FA2 100%); }
        .book:nth-child(13) .book-spine { background: linear-gradient(135deg, #388E3C 0%, #00695C 100%); }
        .book:nth-child(14) .book-spine { background: linear-gradient(135deg, #5E35B1 0%, #512DA8 100%); }
        .book:nth-child(15) .book-spine { background: linear-gradient(135deg, #EF5350 0%, #E53935 100%); }
        .book:nth-child(16) .book-spine { background: linear-gradient(135deg, #F57F17 0%, #F57C00 100%); }
        .book:nth-child(17) .book-spine { background: linear-gradient(135deg, #0089D0 0%, #0097A7 100%); }
        .book:nth-child(18) .book-spine { background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%); }
        .book:nth-child(19) .book-spine { background: linear-gradient(135deg, #FF6D00 0%, #E65100 100%); }
        .book:nth-child(20) .book-spine { background: linear-gradient(135deg, #00838F 0%, #006064 100%); }
        .book:nth-child(21) .book-spine { background: linear-gradient(135deg, #3F51B5 0%, #303F9F 100%); }
        .book:nth-child(22) .book-spine { background: linear-gradient(135deg, #D81B60 0%, #C2185B 100%); }
        .book:nth-child(23) .book-spine { background: linear-gradient(135deg, #8BC34A 0%, #689F38 100%); }
        .book:nth-child(24) .book-spine { background: linear-gradient(135deg, #FF5722 0%, #D84315 100%); }
        .book:nth-child(25) .book-spine { background: linear-gradient(135deg, #00BCD4 0%, #0097A7 100%); }
        .book:nth-child(26) .book-spine { background: linear-gradient(135deg, #9575CD 0%, #7E57C2 100%); }
        .book:nth-child(27) .book-spine { background: linear-gradient(135deg, #FFCA28 0%, #FFA000 100%); }
        .book:nth-child(28) .book-spine { background: linear-gradient(135deg, #E65100 0%, #D84315 100%); }
        .book:nth-child(29) .book-spine { background: linear-gradient(135deg, #1A237E 0%, #283593 100%); }
        .book:nth-child(30) .book-spine { background: linear-gradient(135deg, #BF360C 0%, #E65100 100%); }
        
        /* Fallback for more than 30 books */
        .book:nth-child(n+31) .book-spine { 
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
        }

        /* Book Thickness */
        .book-thickness {
            width: calc(100% + 6px);
            height: 18px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.45));
            border-top: 2px solid rgba(255,255,255,0.25);
            border-radius: 0 0 5px 5px;
            margin-left: -3px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.6), 3px 8px 15px rgba(0, 0, 0, 0.25);
        }

        /* Hover Effect */
        .book:hover .book-spine {
            transform: translateY(-22px) rotateZ(3deg) scaleY(1.08) scaleX(1.05);
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.2), 0px 25px 50px rgba(0, 0, 0, 0.4);
            filter: brightness(1.2);
            z-index: 10;
        }

        .book:hover .book-thickness {
            transform: scaleX(1.15) translateY(4px) rotateZ(-1deg);
            opacity: 0.5;
        }

        /* Open Library Button */
        .open-library-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 35px;
            background: linear-gradient(135deg, #228B22 0%, #1a6b1a 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(34, 139, 34, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .open-library-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(34, 139, 34, 0.4);
            background: linear-gradient(135deg, #2aad2a 0%, #228B22 100%);
        }

        /* Footer */
        footer {
            text-align: center;
            color: #333;
            padding: 30px 20px;
            background: linear-gradient(135deg, rgba(34, 139, 34, 0.08) 0%, rgba(220, 20, 60, 0.05) 100%);
            margin-top: 50px;
            border-top: 4px solid #228B22;
            font-size: 1.05rem;
            box-shadow: 0 -4px 12px rgba(34, 139, 34, 0.08);
        }

        footer p {
            margin: 5px 0;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 12px rgba(34, 139, 34, 0.1); }
            50% { box-shadow: 0 8px 30px rgba(34, 139, 34, 0.3); }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .books-display {
                grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
                gap: 12px;
                min-height: 280px;
            }

            .book-spine {
                height: 180px;
                font-size: 0.85rem;
            }
            
            .books-display--many {
                grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
                gap: 15px;
                min-height: 310px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .books-display {
                grid-template-columns: repeat(auto-fit, minmax(65px, 1fr));
                gap: 10px;
                min-height: 240px;
            }
            
            .books-display--many {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
                gap: 12px;
                min-height: 270px;
            }

            .book-spine {
                height: 160px;
                font-size: 0.75rem;
                padding: 8px;
            }

            .writer-header {
                flex-direction: column;
                text-align: center;
            }

            .writer-header h2 {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.2rem;
                margin: 0;
            }

            .books-display {
                grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
                gap: 6px;
                min-height: 180px;
            }
            
            .books-display--many {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
                gap: 8px;
                min-height: 200px;
            }

            .book-spine {
                height: 120px;
                font-size: 0.55rem;
                padding: 4px;
            }

            .back-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            .container {
                padding: 20px 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>📚 Writers </h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button class="theme-toggle-writers" id="themeToggleWriters" title="Toggle dark mode">Dark Mode</button>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search by writer name, book title, or category..."
            >
            <button id="clearBtn" class="search-clear">Clear</button>
        </div>
        <div id="searchResults" class="search-results">
            <div class="search-result-count"></div>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <!-- Container -->
    <div class="container" id="writers-container">
        <!-- Writers and books will be loaded here dynamically -->
        <div style="text-align: center; color: white; padding: 40px;">
            <p>Loading library...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>🌟 Tasin's Digital Library </p>
        <p style="margin-top: 10px; font-size: 0.9rem; opacity: 0.8;">Explore. Discover. Read. Download. 📚</p>
    </footer>

    <script>
        // Search functionality
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const searchResults = document.getElementById('searchResults');
        const resultsContainer = document.getElementById('resultsContainer');
        let allWriters = [];

        function performSearch(query) {
            if (!query.trim()) {
                searchResults.classList.remove('active');
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = [];

            // Search through all writers and their content
            allWriters.forEach(writerName => {
                const isWriterMatch = writerName.toLowerCase().includes(lowerQuery);
                
                if (isWriterMatch) {
                    results.push({ type: 'writer', name: writerName });
                } else {
                    // Search in books
                    const books = getWriterBooks(writerName);
                    books.forEach(book => {
                        if (book.title.toLowerCase().includes(lowerQuery)) {
                            results.push({ type: 'book', writer: writerName, book: book.title });
                        }
                    });

                    // Search in categories
                    if (isWriterWithCategories(writerName)) {
                        const categories = getCategories(writerName);
                        categories.forEach(category => {
                            if (category.toLowerCase().includes(lowerQuery)) {
                                results.push({ type: 'category', writer: writerName, category: category });
                            }
                        });
                    }
                }
            });

            displayResults(results, lowerQuery);
        }

        function displayResults(results, query) {
            if (results.length === 0) {
                searchResults.classList.add('active');
                resultsContainer.innerHTML = '<div class="no-results">No results found for "' + query + '"</div>';
                document.querySelector('.search-result-count').textContent = 'No results';
                return;
            }

            searchResults.classList.add('active');
            document.querySelector('.search-result-count').textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' found';
            
            resultsContainer.innerHTML = results.map(result => {
                if (result.type === 'writer') {
                    return `<div class="search-result-item" onclick="document.getElementById('writers-container').scrollIntoView({ behavior: 'smooth' }); highlightWriter('${result.name}')">
                        <div class="search-result-writer">📖 ${result.name}</div>
                    </div>`;
                } else if (result.type === 'book') {
                    return `<div class="search-result-item" onclick="document.getElementById('writers-container').scrollIntoView({ behavior: 'smooth' }); highlightWriter('${result.writer}')">
                        <div class="search-result-writer">${result.writer}</div>
                        <div class="search-result-book">📕 ${result.book}</div>
                    </div>`;
                } else if (result.type === 'category') {
                    return `<div class="search-result-item" onclick="document.getElementById('writers-container').scrollIntoView({ behavior: 'smooth' }); highlightWriter('${result.writer}')">
                        <div class="search-result-writer">${result.writer}</div>
                        <div class="search-result-book">📂 ${result.category}</div>
                    </div>`;
                }
            }).join('');
        }

        function highlightWriter(writerName) {
            const element = document.getElementById(writerName);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                element.style.animation = 'pulse 0.6s ease';
            }
        }

        searchInput.addEventListener('input', (e) => {
            performSearch(e.target.value);
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            searchResults.classList.remove('active');
            resultsContainer.innerHTML = '';
            searchInput.focus();
        });

        function changeWriterIcon(writerName, currentIcon) {
            const newIcon = prompt(`Change icon for "${writerName}"\n\nCurrent: ${currentIcon}\n\nEnter new emoji or icon:`, currentIcon);
            if (newIcon && newIcon !== currentIcon) {
                const customIconKey = `icon_writer_${writerName}`;
                localStorage.setItem(customIconKey, newIcon);
                location.reload(); // Reload to show updated icon
            }
        }

        function loadWritersAndBooks() {
            const container = document.getElementById('writers-container');
            let writers = getWriters();
            allWriters = writers;
            
            // Sort writers alphabetically
            writers = writers.sort((a, b) => a.localeCompare(b));
            
            // Clear container
            container.innerHTML = '';

            // For each writer, create a section
            writers.forEach((writerName, index) => {
                const icon = getWriterIcon(writerName);
                const hasCategories = isWriterWithCategories(writerName);

                // Create writer section
                const section = document.createElement('section');
                section.className = 'writer-section';
                section.id = writerName;

                // Writer header
                const header = document.createElement('div');
                header.className = 'writer-header';
                header.style.cursor = hasCategories ? 'pointer' : 'default';
                header.innerHTML = `
                    <div class="writer-header-icon" style="cursor: pointer; position: relative;" title="Click to change icon" onclick="changeWriterIcon('${writerName.replace(/'/g, "\\'")}', '${icon}')">
                        ${icon}
                        <span style="position: absolute; bottom: -10px; right: -10px; background: #228B22; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold;">✎</span>
                    </div>
                    <h2>${writerName}</h2>
                `;

                // If has categories, make header clickable and show categories
                if (hasCategories) {
                    header.style.transition = 'all 0.3s ease';
                    header.style.cursor = 'default';

                    // Bookshelf showing categories as cards
                    const bookshelf = document.createElement('div');
                    bookshelf.className = 'bookshelf';
                    const categories = getCategories(writerName);
                    
                    // Add clear directions for users
                    const directionsDiv = document.createElement('div');
                    directionsDiv.style.cssText = `
                        background: linear-gradient(135deg, rgba(34, 139, 34, 0.1) 0%, rgba(220, 20, 60, 0.05) 100%);
                        padding: 20px 25px;
                        border-left: 6px solid #228B22;
                        border-radius: 8px;
                        margin-bottom: 25px;
                        border: 2px solid #228B22;
                    `;
                    directionsDiv.innerHTML = `
                        <div style="font-size: 16px; font-weight: 800; color: #228B22; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 22px;">👇</span>
                            <span>Select a Category Below</span>
                        </div>
                        <div style="font-size: 14px; color: #666; font-weight: 600;">
                            Click on any category card to browse all ${writerName}'s books in that genre.
                        </div>
                    `;
                    bookshelf.appendChild(directionsDiv);
                    
                    // Create a grid for categories
                    const categoriesGrid = document.createElement('div');
                    categoriesGrid.style.cssText = 'display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 10px;';
                    
                    // Display each category as a card
                    categories.forEach((category, idx) => {
                        const categoryBooks = getBooksInCategory(writerName, category);
                        // Get manual icon from data or use default
                        const categoryIcon = writersData[writerName]?.categoryIcons?.[category] || '📖';
                        const categoryCard = document.createElement('div');
                        categoryCard.style.cssText = `
                            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 255, 240, 0.95) 100%);
                            padding: 25px 20px;
                            border-radius: 15px;
                            text-align: center;
                            border: 3px solid #228B22;
                            cursor: pointer;
                            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                            box-shadow: 0 6px 15px rgba(34, 139, 34, 0.15);
                            animation: slideUp 0.5s ease backwards;
                            animation-delay: ${idx * 0.1}s;
                        `;
                        
                        categoryCard.onmouseover = () => {
                            categoryCard.style.transform = 'translateY(-10px) scale(1.05)';
                            categoryCard.style.boxShadow = '0 15px 40px rgba(34, 139, 34, 0.25)';
                            categoryCard.style.background = 'linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(220, 255, 220, 1) 100%)';
                            categoryCard.style.borderColor = '#DC143C';
                        };
                        
                        categoryCard.onmouseout = () => {
                            categoryCard.style.transform = 'translateY(0) scale(1)';
                            categoryCard.style.boxShadow = '0 6px 15px rgba(34, 139, 34, 0.15)';
                            categoryCard.style.background = 'linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 255, 240, 0.95) 100%)';
                            categoryCard.style.borderColor = '#228B22';
                        };
                        
                        categoryCard.onclick = () => {
                            window.location.href = `books-by-category.html?writer=${encodeURIComponent(writerName)}&category=${encodeURIComponent(category)}`;
                        };
                        
                        categoryCard.innerHTML = `
                            <div style="font-size: 18px; font-weight: 800; color: #228B22; margin-bottom: 10px;">${category}</div>
                            <div style="font-size: 14px; color: #666; font-weight: 600; padding: 8px 12px; background: rgba(34, 139, 34, 0.1); border-radius: 20px; display: inline-block;">
                                ${categoryBooks.length} books
                            </div>
                        `;
                        
                        categoriesGrid.appendChild(categoryCard);
                    });
                    
                    bookshelf.appendChild(categoriesGrid);
                    section.appendChild(header);
                    section.appendChild(bookshelf);
                } else {
                    // Regular writer with direct books
                    const books = getWriterBooks(writerName);

                    // Bookshelf
                    const bookshelf = document.createElement('div');
                    bookshelf.className = 'bookshelf';

                    const booksDisplay = document.createElement('div');
                    booksDisplay.className = 'books-display';
                    
                    // Add class for many books to adjust sizing
                    if (books.length > 5) {
                        booksDisplay.classList.add('books-display--many');
                    }

                    // Add each book
                    books.forEach((book, bookIndex) => {
                        const bookDiv = document.createElement('div');
                        bookDiv.className = 'book';
                        bookDiv.style.animationDelay = `${bookIndex * 0.1}s`;
                        
                        // Make book clickable
                        bookDiv.style.cursor = 'pointer';
                        bookDiv.onclick = () => {
                            window.location.href = `book.html?writer=${encodeURIComponent(writerName)}&book=${encodeURIComponent(book.title)}`;
                        };

                        const bookSpine = document.createElement('div');
                        bookSpine.className = 'book-spine';
                        bookSpine.textContent = book.title;

                        const bookThickness = document.createElement('div');
                        bookThickness.className = 'book-thickness';

                        bookDiv.appendChild(bookSpine);
                        bookDiv.appendChild(bookThickness);
                        booksDisplay.appendChild(bookDiv);
                    });

                    bookshelf.appendChild(booksDisplay);
                    section.appendChild(header);
                    section.appendChild(bookshelf);
                }

                container.appendChild(section);
            });
        }

        // Load writers when page loads
        window.addEventListener('load', loadWritersAndBooks);

        // Also load immediately in case JS executes before page fully loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadWritersAndBooks);
        } else {
            loadWritersAndBooks();
        }

        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleWriters = document.getElementById('themeToggleWriters');
            const currentTheme = localStorage.getItem('theme') || 'light';

            // Default to light mode
            document.body.classList.remove('dark-mode');
            
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                if (themeToggleWriters) themeToggleWriters.textContent = 'Light Mode';
            } else {
                if (themeToggleWriters) themeToggleWriters.textContent = 'Dark Mode';
            }

            if (themeToggleWriters) {
                themeToggleWriters.addEventListener('click', () => {
                    document.body.classList.toggle('dark-mode');
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
                    themeToggleWriters.textContent = isDarkMode ? 'Light Mode' : 'Dark Mode';
                });
            }
        });
    </script>
</body>
</html>
