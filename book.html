<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Book - Tasin's Bookshelf</title>
    <link rel="stylesheet" href="js/data.js">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Raleway', 'Inter', sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f5 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle 800px at 20% 50%, rgba(34, 139, 34, 0.08) 0%, transparent 100%),
                radial-gradient(circle 600px at 80% 80%, rgba(220, 20, 60, 0.08) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeIn 0.6s ease;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #228B22 0%, #1a6b1a 100%);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-size: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(34, 139, 34, 0.2);
            border: none;
            cursor: pointer;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(34, 139, 34, 0.3);
        }

        .breadcrumb {
            flex: 1;
        }

        .breadcrumb-link {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .breadcrumb-link:hover {
            color: #228B22;
        }

        .breadcrumb-link.active {
            color: #333;
            font-weight: 600;
        }

        .book-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .book-cover {
            background: linear-gradient(135deg, #DC143C 0%, #8B0000 100%);
            border-radius: 15px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 450px;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .book-cover::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: shine 3s ease infinite;
        }

        @keyframes shine {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .book-cover-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .book-cover-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .book-cover-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .book-cover-author {
            font-size: 16px;
            opacity: 0.9;
        }

        .book-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .book-title {
            font-size: 42px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .book-author {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }

        .book-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
            padding: 25px;
            background: white;
            border-radius: 15px;
            border-left: 4px solid #228B22;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .meta-value {
            font-size: 18px;
            font-weight: 600;
            color: #228B22;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-read {
            background: linear-gradient(135deg, #228B22 0%, #1a6b1a 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(34, 139, 34, 0.3);
        }

        .btn-read:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(34, 139, 34, 0.4);
        }

        .btn-download {
            background: linear-gradient(135deg, #DC143C 0%, #b01030 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(220, 20, 60, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(220, 20, 60, 0.4);
        }

        .btn-read:active,
        .btn-download:active {
            transform: translateY(-2px);
        }

        .book-description {
            background: white;
            padding: 30px;
            border-radius: 15px;
            line-height: 1.8;
            color: #555;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .description-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        .setup-note {
            background: #fff3cd;
            border-left: 4px solid #DC143C;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .setup-note strong {
            color: #DC143C;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .book-container {
                grid-template-columns: 1fr;
            }

            .book-cover {
                min-height: 300px;
            }

            .book-title {
                font-size: 32px;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .book-meta {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .book-title {
                font-size: 24px;
            }

            .book-author {
                font-size: 16px;
            }

            .book-meta {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()" title="Go back">←</button>
            <div class="breadcrumb" id="breadcrumb-container">
                <a href="index.html" class="breadcrumb-link">Library</a>
                <span style="color: #ddd; margin: 0 10px;">→</span>
                <a href="writers.html" class="breadcrumb-link">Writers</a>
                <span style="color: #ddd; margin: 0 10px;">→</span>
                <span id="writer-name" class="breadcrumb-link">Loading...</span>
                <span style="color: #ddd; margin: 0 10px;">→</span>
                <span id="book-title-breadcrumb" class="breadcrumb-link active">Book</span>
            </div>
        </div>

        <div class="book-container">
            <div class="book-cover">
                <div class="book-cover-content">
                    <div class="book-cover-icon">📖</div>
                    <div class="book-cover-title" id="book-title-cover">Book Title</div>
                    <div class="book-cover-author" id="book-author-cover">Author Name</div>
                </div>
            </div>

            <div class="book-info">
                <h1 class="book-title" id="book-title">Book Title</h1>
                <p class="book-author" id="book-author">by Author Name</p>

                <div class="book-meta">
                    <div class="meta-item">
                        <span class="meta-label">File Size</span>
                        <span class="meta-value" id="book-size">~2.5 MB</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Format</span>
                        <span class="meta-value">PDF</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Access</span>
                        <span class="meta-value">Free</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Status</span>
                        <span class="meta-value" style="color: #228B22;">Available</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn btn-read" onclick="readBook()" title="Open in Google Drive to read">
                        👁️ Read Online
                    </button>
                    <button class="action-btn btn-download" onclick="downloadBook()" title="Download to your device">
                        ⬇️ Download
                    </button>
                </div>


            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        // Get parameters from URL
        const params = new URLSearchParams(window.location.search);
        const writerName = params.get('writer');
        const bookTitle = params.get('book');
        const categoryName = params.get('category');

        function goBack() {
            if (categoryName) {
                // If coming from a category, go back to the category books page
                window.location.href = `books-by-category.html?writer=${encodeURIComponent(writerName)}&category=${encodeURIComponent(categoryName)}`;
            } else if (writerName) {
                // If coming from regular writer, go back to writers page
                window.location.href = `writers.html#${writerName}`;
            } else {
                window.location.href = 'writers.html';
            }
        }

        function loadBook() {
            if (!writerName || !bookTitle) {
                document.querySelector('.container').innerHTML = '<div style="text-align: center; padding: 60px 20px; color: #666;"><h2>Book not found</h2><p>Please select a book from the library.</p><a href="writers.html" style="color: #228B22; text-decoration: none; font-weight: 600;">← Back to Library</a></div>';
                return;
            }

            const book = getBook(writerName, bookTitle, categoryName);
            if (!book) {
                document.querySelector('.container').innerHTML = '<div style="text-align: center; padding: 60px 20px; color: #666;"><h2>Book not found</h2><a href="writers.html" style="color: #228B22; text-decoration: none; font-weight: 600;">← Back to Library</a></div>';
                return;
            }

            // Update page title
            document.title = `${bookTitle} - Tasin's Bookshelf`;

            // Update breadcrumb
            const breadcrumbContainer = document.getElementById('breadcrumb-container');
            if (categoryName) {
                breadcrumbContainer.innerHTML = `
                    <a href="index.html" class="breadcrumb-link">Library</a>
                    <span style="color: #ddd; margin: 0 10px;">→</span>
                    <a href="writers.html" class="breadcrumb-link">Writers</a>
                    <span style="color: #ddd; margin: 0 10px;">→</span>
                    <a href="categories.html?writer=${encodeURIComponent(writerName)}" class="breadcrumb-link">${writerName}</a>
                    <span style="color: #ddd; margin: 0 10px;">→</span>
                    <a href="books-by-category.html?writer=${encodeURIComponent(writerName)}&category=${encodeURIComponent(categoryName)}" class="breadcrumb-link">${categoryName}</a>
                    <span style="color: #ddd; margin: 0 10px;">→</span>
                    <span class="breadcrumb-link active">${bookTitle}</span>
                `;
            } else {
                document.getElementById('writer-name').textContent = writerName;
                document.getElementById('book-title-breadcrumb').textContent = bookTitle;
            }

            // Update all text elements
            document.getElementById('book-title').textContent = bookTitle;
            document.getElementById('book-title-cover').textContent = bookTitle;
            document.getElementById('book-author').textContent = `by ${writerName}`;
            document.getElementById('book-author-cover').textContent = writerName;
            document.getElementById('book-size').textContent = book.size || '~2.5 MB';
        }

        function readBook() {
            const book = getBook(writerName, bookTitle, categoryName);
            if (!book || !book.fileId || book.fileId === 'PASTE_FILE_ID_HERE') {
                alert('This book is currently not available. Please try again later.');
                return;
            }
            // Open Google Drive file viewer
            window.open(`https://drive.google.com/file/d/${book.fileId}/view`, '_blank');
        }

        function downloadBook() {
            const book = getBook(writerName, bookTitle, categoryName);
            if (!book || !book.fileId || book.fileId === 'PASTE_FILE_ID_HERE') {
                alert('This book is currently not available for download. Please try again later.');
                return;
            }
            // Download from Google Drive
            window.open(`https://drive.google.com/uc?export=download&id=${book.fileId}`, '_blank');
        }

        // Initialize page on load
        window.addEventListener('load', loadBook);
    </script>
</body>
</html>
